name: Engineering task
description: Propose a scoped implementation task
title: "task: <short summary>"
labels:
  - type-feature
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should this task achieve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Explicitly list in-scope and out-of-scope items.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: High-level implementation plan and tradeoffs.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Measurable completion criteria.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Commands/tests required before merge.
      value: |
        pnpm -r --if-present lint
        pnpm -r --if-present typecheck
        pnpm -r --if-present test
        pnpm -r --if-present build
        pnpm e2e
    validations:
      required: true
