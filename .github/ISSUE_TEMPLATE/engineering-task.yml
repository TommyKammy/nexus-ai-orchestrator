name: Engineering task
description: Propose a scoped implementation task
title: "task: <short summary>"
labels:
  - type-feature
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should this task achieve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Explicitly list in-scope and out-of-scope items.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: High-level implementation plan and tradeoffs.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Measurable completion criteria.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Commands/tests required before merge.
      value: |
        docker run --rm -v "$PWD/policy/opa:/policy" openpolicyagent/opa:0.68.0 \
          check /policy/authz.rego /policy/risk.rego
        docker run --rm -v "$PWD/policy/opa:/policy" openpolicyagent/opa:0.68.0 \
          eval --data /policy --input /policy/example_input.json "data.ai.policy.result"
        python3 -m py_compile executor/api_server.py executor/policy_client.py executor/run_task.py
        python3 scripts/validate_slack_workflows.py n8n/workflows-v3
        bash scripts/ci/n8n_import_test.sh
    validations:
      required: true
